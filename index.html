<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />

    <!-- Primary Meta Tags -->
    <title>Fede Bello – Lead Machine Learning Engineer</title>
    <meta name="description" content="Portfolio of Fede Bello, Lead Machine Learning Engineer. Explore projects, research publications, and professional experience." />
    <meta name="author" content="Fede Bello" />

    <!-- Canonical (updated dynamically per route via React) -->
    <link rel="canonical" href="https://fedebello.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (Facebook, LinkedIn, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fedebello.com" />
    <meta property="og:title" content="Fede Bello – Lead Machine Learning Engineer" />
    <meta property="og:description" content="Portfolio of Fede Bello, Lead Machine Learning Engineer. Explore projects, research publications, and professional experience." />
    <meta property="og:image" content="https://fedebello.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Fede Bello" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fede Bello – Lead Machine Learning Engineer" />
    <meta name="twitter:description" content="Portfolio of Fede Bello, Lead Machine Learning Engineer. Explore projects, research publications, and professional experience." />
    <meta name="twitter:image" content="https://fedebello.com/og-image.png" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Fede Bello",
      "url": "https://fedebello.com",
      "image": "https://fedebello.com/og-image.png",
      "jobTitle": "Lead Machine Learning Engineer",
      "sameAs": []
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  <script>
    // Inline theme init to avoid FOUC
    (function () {
      try {
        const stored = localStorage.getItem("theme");
        if (stored === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (_) {}
    })();
  </script>
</html>
