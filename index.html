<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- Primary Meta Tags -->
    <title>Federico Bello | Portfolio</title>
    <meta name="description" content="Lead ML Engineer at Tryolabs. Graph Neural Networks, AI systems &amp; applied mathematics. Explore Federico Bello's projects and publications." />
    <meta name="author" content="Federico Bello" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical (updated dynamically per route via React) -->
    <link rel="canonical" href="https://fedebello.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/me.png" />

    <!-- Open Graph (Facebook, LinkedIn, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fedebello.com" />
    <meta property="og:title" content="Federico Bello | Portfolio" />
    <meta property="og:description" content="Lead ML Engineer at Tryolabs. Graph Neural Networks, AI systems &amp; applied mathematics. Explore Federico Bello's projects and publications." />
    <meta property="og:image" content="https://fedebello.com/me.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Federico Bello" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Federico Bello | Portfolio" />
    <meta name="twitter:description" content="Lead ML Engineer at Tryolabs. Graph Neural Networks, AI systems &amp; applied mathematics. Explore Federico Bello's projects and publications." />
    <meta name="twitter:image" content="https://fedebello.com/me.png" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Federico Bello",
      "url": "https://fedebello.com",
      "image": "https://fedebello.com/me.png",
      "jobTitle": "Lead Machine Learning Engineer",
      "sameAs": [
        "https://www.linkedin.com/in/federico-bello-/",
        "https://github.com/fede-bello"
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  <script>
    // Inline theme init to avoid FOUC
    (function () {
      try {
        const stored = localStorage.getItem("theme");
        if (stored === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (_) {}
    })();
  </script>
</html>
